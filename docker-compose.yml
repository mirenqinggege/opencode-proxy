services:
  opencode-proxy:
    build: .
    image: registry.cn-hangzhou.aliyuncs.com/mirenqinggege/opencode-proxy:latest
    ports:
      - "4000:${SERVICE_PORT:-4000}"
      - "8082:${DASHBOARD_PORT:-8082}"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - default

networks:
  default:
    driver: bridge
